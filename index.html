<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08080f" />
    <meta name="description" content="YTDLnis – Download videos and audio from anywhere. A powerful yt-dlp frontend." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YTDLnis" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>YTDLnis</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clear service workers and cache storage to prevent stale cached bundle issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (const registration of registrations) {
            registration.unregister().then(() => {
              console.log('Successfully unregistered service worker');
            });
          }
        }).catch((err) => console.error(err));
      }
      if ('caches' in window) {
        caches.keys().then((keys) => {
          for (const key of keys) {
            caches.delete(key).then(() => {
              console.log('Deleted cache:', key);
            });
          }
        }).catch((err) => console.error(err));
      }
      // One-time automatic force-reload to ensure clean state
      if (!sessionStorage.getItem('dev_force_reloaded_v4')) {
        sessionStorage.setItem('dev_force_reloaded_v4', 'true');
        setTimeout(() => {
          window.location.reload();
        }, 300);
      }
    </script>
  </body>
</html>
